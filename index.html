<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gaming Executive Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--acc:#2563EB;--dark:#111827;--sec:#4B5563;--gray:#9CA3AF;--bg:#F8FAFC;--red:#B91C1C;--green:#047857;--border:#E5E7EB}
*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark)}
header{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:10}
header h1{margin:0 0 8px;font-size:18px}
nav{display:flex;flex-wrap:wrap;gap:6px}
nav button{background:#fff;border:1px solid var(--border);border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px;color:var(--sec)}
nav button.active{background:var(--acc);color:#fff;border-color:var(--acc)}
main{max-width:1280px;margin:0 auto;padding:20px}
section{display:none}section.active{display:block}
h2{font-size:17px;margin:6px 0 2px}
.takeaway{color:var(--sec);font-size:13.5px;margin:0 0 14px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px}
.kpi .v{font-size:22px;font-weight:600}.kpi .l{font-size:11px;color:var(--sec);margin-top:2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px}
.card h3{font-size:13px;margin:0 0 4px}
.hint{font-size:11.5px;color:var(--gray);font-style:italic;margin:0 0 10px}
.card .note{font-size:11px;color:var(--red);margin:6px 0 0}
canvas{max-height:300px}
table{border-collapse:collapse;width:100%;font-size:12px}
th,td{border:1px solid var(--border);padding:5px 7px;text-align:right}
th:first-child,td:first-child{text-align:left}td:first-child{color:var(--dark)}
thead th{background:var(--bg);text-align:left}
.footer{font-size:11px;color:var(--sec);background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:14px}
.risk{border-left:4px solid var(--gray);padding:8px 12px;background:#fff;border-radius:6px;margin-bottom:8px;font-size:13px}
.risk.breach{border-left-color:var(--red)}
.method p,.prose p{font-size:13.5px;line-height:1.55;max-width:1050px}
.prose li{font-size:13px;line-height:1.5;margin-bottom:6px}
.tag{display:inline-block;font-size:10px;background:#DBEAFE;color:#1E40AF;border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle}
.pill{display:inline-block;font-size:11px;border-radius:10px;padding:1px 9px;margin-right:4px}
.ok{background:#D1FAE5;color:#047857}.warn{background:#FEE2E2;color:#B91C1C}
.finding{background:#fff;border:1px solid var(--border);border-left:4px solid var(--acc);border-radius:8px;padding:14px;margin-bottom:12px}
.finding b{font-size:14px}.finding p{margin:6px 0 0;font-size:13px;color:var(--sec)}
.flow{display:flex;flex-wrap:wrap;gap:8px;align-items:stretch;margin:10px 0}
.step{flex:1;min-width:150px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px}
.step b{display:block;font-size:12.5px;margin-bottom:3px;color:var(--acc)}
</style>
</head>

(()=>{const g=document.getElementById('p0_grid');g.style.gridTemplateColumns='1fr';
g.innerHTML=`
<div class="card prose"><h3>The data journey</h3>
<div class="flow">
<div class="step"><b>1 · Original sources</b>vgchartz-2024.csv (64,016 console sales rows) + vg_data_dictionary.csv. Rich history, but messy: duplicates, missing sales, one critic score on a 0-10 scale, nothing about PC/digital.</div>
<div class="step"><b>2 · Gap analysis</b>Executive questions needed quality scores, review counts, regional detail and the modern PC market — the original pair could not answer them alone.</div>
<div class="step"><b>3 · Added datasets</b>Video_Games_Sales_as_at_22_Dec_2016 (16,719 rows: Metacritic critic/user scores, ESRB) + two Steam catalog snapshots: May 2024 (83,646 apps) and March 2025 (89,618 apps).</div>
<div class="step"><b>4 · Cleaning pipeline</b>Reproducible Python pipeline (seed 42): dedup, sentinel repair, scale alignment, enrichment join, snapshot deltas. 15/15 critical tests passed; every dropped row logged.</div>
<div class="step"><b>5 · Model & dashboards</b>Star-schema model (5 facts, 5 dimensions, genre bridge), 103 measures, 4 dashboards. Hypothesis titles rewritten to match the evidence. See the Data & Cleaning tab.</div>
</div></div>
<div class="finding"><b>1 · Market Structure — the market consolidated while releases exploded.</b><p>Top-10 publishers’ pooled unit share rose 58% → 75% between 1994-98 and 2014-18 and HHI agrees; meanwhile Steam grew to ~15,000 new releases per year. Space for smaller publishers exists in specific genre-platform cells (30.8% non-major share overall).</p></div>
<div class="finding"><b>2 · Portfolio Economics — averages mislead; quality pays, but as an association.</b><p>Genres rank differently by median units and hit rate than by totals. Each critic-score band up roughly doubles median units (0.14M below 60 → 0.84M at 85+, non-overlapping confidence intervals). On Steam, user sentiment does NOT track ownership scale (ρ = −0.007) — an honest null result.</p></div>
<div class="finding"><b>3 · Current PC Reality — most new releases stay obscure; the definition drives the headline.</b><p>Under a meaningful bar (>20k owners or 50+ reviews) only 16.1% of the 14,650-title new cohort gets traction; the median title receives 2 reviews. A looser rule says 80%, a stricter one 3% — greenlight decisions need the definition stated.</p></div>
<div class="finding"><b>4 · Geography & Risk — regional skews are decision-grade; posture choice is not.</b><p>RPGs and Strategy over-index in Japan ~3×, shooters under-index at 0.33×. But the portfolio scenario matrix shows all three postures (AAA / mid-market / barbell) retain ~75 under combined downside — the working hypothesis that a barbell wins was reversed by the data.</p></div>
<div class="card prose"><h3>How to use this dashboard</h3><ul>
<li>Tabs across the top switch between pages. Start with <b>Data & Cleaning</b> if you want to trust the numbers first.</li>
<li>Every chart has a one-line “How to read” hint and hover tooltips with exact values and sample sizes.</li>
<li>Grey “n&lt;30” cells are deliberately suppressed — too few observations for a reliable value.</li>
<li>Red text marks warnings, reporting boundaries and breached risk thresholds.</li>
<li>Each page ends with a scope-and-caveats box: what the data can and cannot say.</li></ul></div>`;
})();

<li><b>Duplicate records.</b> vgchartz contained 379 duplicate title-platform groups (382 excess rows) that would silently double-count sales.</li>
<li><b>Missing is not zero.</b> 70.4% of console rows have no reported sales. Treating them as 0 would crash every average — they are kept as null and excluded from sales math, never zero-filled.</li>
<li><b>Fake zeros (sentinels).</b> In the Steam files a metacritic score of 0 means “not scored”, not “terrible”: 79,706 of 83,646 May rows had this. Zeros were converted to null for scores and playtime, but deliberately NOT for price and review counts, where 0 is real.</li>
<li><b>Incompatible score scales.</b> VGChartz critic scores are 0-10, the 2016 file is 0-100, Steam user sentiment is a % — they were aligned (×10) where valid and <i>never blended across providers</i>.</li>
<li><b>Text instead of numbers.</b> Steam owners come as text ranges (“20,000 – 50,000”). They were mapped to ordered buckets; midpoints were never invented.</li>
<li><b>Schema drift between snapshots.</b> The March file renamed AppID→appid and added a column — harmonized before comparison.</li>
<li><b>Ambiguous free-to-play.</b> Price = 0 does not mean F2P (demos, delisted). F2P requires an explicit descriptor; unverified zero-price titles are flagged instead of guessed.</li>
<li><b>Old data pretending to be current.</b> VGChartz retail estimates fade after ~2018 (digital sales invisible). Rather than show a fake “market collapse”, everything after 2018 is fenced off behind a reliability flag.</li>
<li><b>“tbd” in numeric columns, mixed date formats, unicode noise</b> — all normalized with strict parsing; unparseable dates kept as null with the source string retained.</li></ul>`,
 'each bullet is one class of silent error that would have produced wrong executive conclusions.');

<div><span class="pill ok">C01–C15 critical: 15/15 pass</span><span class="pill ok">Sales reconciliation: 2,222/2,222</span><span class="pill ok">Source hashes unchanged</span><span class="pill warn">13 documented warnings (kept visible, not hidden)</span></div>
<p class="prose">The warnings are honest limitations, not failures — e.g. 70.4% of console rows lack reported sales (a property of VGChartz), 2,772 Steam apps had negative review deltas (source-side corrections, flagged and kept), and 6 genres have cohorts under n=30 (suppressed in visuals). Full logs: cleaning_event_summary.csv, data_quality_test_results.csv, row_level_exceptions.csv.</p>`,

<li>A candidate console↔Steam title-matching bridge exists but is <b>excluded pending manual review</b> — no cross-family joins sneak in.</li></ul>`);

/* ---------- P5 METHODOLOGY ---------- */
(()=>{const g=document.getElementById('p5_grid');g.style.gridTemplateColumns='1fr';
g.innerHTML=`<div class="card method">
<p><b>Sources.</b> VGChartz console sales (retailer estimates; reliable trend period ≤2018; missing sales are never zero); 2016 Metacritic-derived score enrichment (16,069 matches; scored titles skew larger); Steam snapshots 2024-05-26 and 2025-03-10 (10-month interval). Pipeline run_20260719_204125, 15/15 data-quality tests passed. Full cleaning story: Data & Cleaning tab.</p>
<p><b>Scope filters.</b> Console trends use reported sales AND the reliable trend period. Steam sentiment requires ≥10 reviews. Cells with fewer than 30 observations are suppressed.</p>
<p><b>Traction definitions.</b> Pipeline v1.0 = any estimated owners OR ≥50 reviews (79.5%). Strict = >20,000 owners OR ≥50 reviews (16.1%). Strictest = both (3.4%). The rank-1 owner bucket is “0–20,000”, so the v1.0 rule mostly measures “has any estimated owners”. Median cohort title receives 2 reviews. Late cohort months are right-censored.</p>
<p><b>Statistics.</b> Medians + bootstrap 95% CIs (2,000 resamples, seed 42); Kruskal-Wallis across score bands H=1084.9, p≈2e-232; Spearman ρ (Steam sentiment vs owners) = −0.007 (n.s., n=49,692); chi-square genre×region p≈3e-65; logistic-regression odds ratios are observational associations, never causal effects.</p>
<p><b>Scenario model.</b> Illustrative unit-based robustness model (no cost/marketing data). Outcomes indexed to each posture's base = 100. Retention under combined downside: 74.7–75.0 across all postures — differences are within assumption noise.</p>
<p><b>Validation.</b> 40/40 automated build checks passed; 12/12 control totals reconciled exactly against source data. Audit trail: model_input_audit, analytical_methodology, validated_findings_register, powerbi_validation_report (project repository).</p>
<p style="color:var(--sec)"><i>This static page mirrors the Power BI project (Gaming_Executive_Dashboard.pbip). Interactive slicing is available in the Power BI version.</i></p></div>`;
